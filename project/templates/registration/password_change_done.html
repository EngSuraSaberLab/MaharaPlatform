{% extends "base.html" %}
{% load i18n %}

{% block title %}{% trans "Password Changed" %}{% endblock %}

{% block content %}
<section class="section" style="padding-top:120px;">
  <div class="container">
    <div class="row justify-content-center">
      <div class="col-lg-5">
        <div class="p-5 text-center" style="border:1px solid var(--surface-border);border-radius:18px;background:var(--surface-color);">
          <i class="bi bi-check-circle" style="font-size:60px;color:var(--primary-color);"></i>
          <h2 class="mt-3">{% trans "Password changed successfully" %}</h2>
          <p style="color:var(--default-color);">{% trans "Your account password has been updated." %}</p>
          <a href="{% url 'homePage' %}" class="btn btn-primary mt-3">{% trans "Back to Home" %}</a>
        </div>
      </div>
    </div>
  </div>
</section>
{% endblock %}
