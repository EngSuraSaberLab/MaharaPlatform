services:
  - type: web
    name: mahara-project
    runtime: python
    plan: free
    rootDir: project
    buildCommand: |
      pip install -r ../requirements.txt
      python manage.py collectstatic --noinput
    startCommand: python manage.py migrate && python manage.py seed_initial_data && gunicorn project.wsgi:application
    envVars:
      - key: DEBUG
        value: False
      - key: PYTHON_VERSION
        value: 3.12.8
      - key: SECRET_KEY
        generateValue: true
      - key: ALLOWED_HOSTS
        value: mahara-project.onrender.com
      - key: CSRF_TRUSTED_ORIGINS
        value: https://mahara-project.onrender.com
      - key: DATABASE_URL
        fromDatabase:
          name: mahara-db
          property: connectionString

databases:
  - name: mahara-db
    plan: free
